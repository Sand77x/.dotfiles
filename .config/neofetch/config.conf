# See this wiki page for more info:
# https://github.com/dylanaraps/neofetch/wiki/Customizing-Info
print_info() {
    prin "\n"
    info "\n \n \n \n \n USER" title
    prin "в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ"
    info " вҖӢ вҖӢ Host" model 
    info " вҖӢ вҖӢ OS" distro 
    info " вҖӢ вҖӢ Kernel" kernel 
    info " вҖӢ вҖӢ WM" wm 
    info " вҖӢ вҖӢ Term" term 
    info " вҖӢ вҖӢ Shell" shell 
    prin "\n" 
    info " вҖӢ вҖӢ IP" local_ip 
    info " вҖӢ вҖӢ Packages" packages 
    info " вҖӢ вҖӢ Uptime" uptime 
    info " вҖӢ вҖӢ Memory" memory 
    prin "\n" 
    info " вҖӢ вҖӢ CPU" cpu 
    info " вҖӢ вҖӢ GPU" gpu 

    wait

    prin "в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ"
    prin "\n"
    prin "\n \n \n \n \n \n \n \n \n ${cl0}в¬Ө ${cl7}в¬Ө ${cl6}в¬Ө ${cl5}в¬Ө ${cl4}в¬Ө ${cl3}в¬Ө ${cl2}в¬Ө ${cl1}в¬Ө"
}

reset="\033[0m"
red="\033[1;31m"
green="\033[1;32m"
yellow="\033[1;33m"
blue="\033[1;34m"
magenta="\033[1;35m"
cyan="\033[1;36m"
white="\033[1;37m"

cl0="${reset}"
cl1="${red}"
cl2="${green}"
cl3="${yellow}"
cl4="${blue}"
cl5="${magenta}"
cl6="${cyan}"
cl7="${white}"

colors=(7 7 3 7 7 3)
ascii_colors=(3 7)

image_backend="ascii"
